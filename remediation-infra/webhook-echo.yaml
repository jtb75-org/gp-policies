apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-echo-script
  namespace: wiz-remediation
data:
  server.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import sys
    import json

    class RequestHandler(BaseHTTPRequestHandler):
        def do_POST(self):
            content_length = int(self.headers['Content-Length'])
            post_data = self.rfile.read(content_length)
            
            print("\n================== RECEIVED WEBHOOK ==================", flush=True)
            print(f"Path: {self.path}", flush=True)
            print(f"Headers:\n{self.headers}", flush=True)
            try:
                # Try to pretty-print JSON
                parsed = json.loads(post_data.decode('utf-8'))
                print(f"Body (JSON):\n{json.dumps(parsed, indent=2)}", flush=True)
            except Exception:
                print(f"Body (Raw):\n{post_data.decode('utf-8')}", flush=True)
            print("======================================================\n", flush=True)
            
            self.send_response(200)
            self.send_header('Content-Type', 'application/json')
            self.end_headers()
            self.wfile.write(b'{"status":"received"}')

    def run(port=8080):
        server_address = ('', port)
        httpd = HTTPServer(server_address, RequestHandler)
        print(f"Starting echo server on port {port}...", flush=True)
        httpd.serve_forever()

    if __name__ == '__main__':
        run()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-echo
  namespace: wiz-remediation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-echo
  template:
    metadata:
      labels:
        app: webhook-echo
    spec:
      containers:
      - name: python
        image: python:3-alpine
        command: ["python", "/app/server.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: script-volume
          mountPath: /app
      volumes:
      - name: script-volume
        configMap:
          name: webhook-echo-script
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-echo
  namespace: wiz-remediation
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: webhook-echo
