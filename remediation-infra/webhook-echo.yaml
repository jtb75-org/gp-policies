apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-echo-script
  namespace: wiz-remediation
data:
  server.py: |
    import sqlite3
    import json
    from http.server import HTTPServer, BaseHTTPRequestHandler

    DB_PATH = "/tmp/webhooks.db"

    def init_db():
        conn = sqlite3.connect(DB_PATH)
        cursor = conn.cursor()
        cursor.execute("""
            CREATE TABLE IF NOT EXISTS webhooks (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                timestamp TEXT DEFAULT (datetime('now', 'localtime')),
                method TEXT,
                path TEXT,
                headers TEXT,
                body TEXT
            )
        """)
        conn.commit()
        conn.close()

    init_db()

    def get_db():
        conn = sqlite3.connect(DB_PATH)
        conn.row_factory = sqlite3.Row
        return conn

    HTML_PAGE = """<!DOCTYPE html>
    <html>
    <head>
        <title>Wiz Webhook Inspector</title>
        <meta charset="utf-8">
        <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #0f172a; color: #f8fafc; display: flex; height: 100vh; overflow: hidden; }
            .sidebar { width: 400px; background-color: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; height: 100%; }
            .header { padding: 16px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; background-color: #0f172a; }
            .header h1 { font-size: 18px; margin: 0; color: #38bdf8; }
            .btn { background-color: #334155; color: #f8fafc; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
            .btn:hover { background-color: #475569; }
            .btn-danger { background-color: #ef4444; }
            .btn-danger:hover { background-color: #dc2626; }
            .list { flex: 1; overflow-y: auto; }
            .item { padding: 12px 16px; border-bottom: 1px solid #334155; cursor: pointer; transition: background 0.1s; }
            .item:hover { background-color: #334155; }
            .item.active { background-color: #0284c7; }
            .item-meta { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
            .item.active .item-meta { color: #e0f2fe; }
            .item-title { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .main { flex: 1; display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding: 24px; box-sizing: border-box; }
            .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #334155; }
            .detail-title { font-size: 20px; font-weight: bold; }
            .section-title { font-size: 14px; font-weight: bold; color: #94a3b8; margin: 16px 0 8px 0; text-transform: uppercase; letter-spacing: 0.05em; }
            pre { background-color: #1e293b; padding: 16px; border-radius: 6px; overflow-x: auto; border: 1px solid #334155; font-family: monospace; font-size: 13px; line-height: 1.5; margin: 0; }
            .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #64748b; }
            .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; background-color: #334155; color: #38bdf8; margin-right: 6px; }
        </style>
    </head>
    <body>
        <div class="sidebar">
            <div class="header">
                <h1>Webhook Inspector</h1>
                <div style="display: flex; align-items: center; gap: 6px;">
                    <select id="refresh-interval" onchange="updateAutoRefresh()" style="background-color: #334155; color: #f8fafc; border: 1px solid #475569; padding: 5px 6px; border-radius: 4px; font-size: 12px; cursor: pointer;">
                        <option value="0">Auto: OFF</option>
                        <option value="2000">Auto: 2s</option>
                        <option value="5000">Auto: 5s</option>
                        <option value="10000">Auto: 10s</option>
                        <option value="30000">Auto: 30s</option>
                    </select>
                    <button class="btn" onclick="fetchWebhooks()">Refresh</button>
                    <button class="btn btn-danger" onclick="clearWebhooks()">Clear</button>
                </div>
            </div>
            <div class="list" id="webhook-list">
                <!-- List items loaded here -->
            </div>
        </div>
        <div class="main" id="main-content">
            <div class="empty-state">
                <h2>No Webhook Selected</h2>
                <p>Select a transaction from the left sidebar or wait for incoming requests.</p>
            </div>
        </div>

        <script>
            let webhooks = [];
            let selectedId = null;
            let refreshTimer = null;

            async function fetchWebhooks() {
                try {
                    const res = await fetch('/api/webhooks');
                    const newWebhooks = await res.json();
                    if (JSON.stringify(newWebhooks) !== JSON.stringify(webhooks)) {
                        webhooks = newWebhooks;
                        renderList();
                        if (selectedId) {
                            const current = webhooks.find(w => w.id === selectedId);
                            if (current) renderDetail(current);
                        }
                    }
                } catch (e) {
                    console.error("Failed to fetch webhooks", e);
                }
            }

            function updateAutoRefresh() {
                if (refreshTimer) {
                    clearInterval(refreshTimer);
                    refreshTimer = null;
                }
                const val = document.getElementById('refresh-interval').value;
                localStorage.setItem('refresh_interval', val);
                const interval = parseInt(val, 10);
                if (interval > 0) {
                    refreshTimer = setInterval(fetchWebhooks, interval);
                }
            }

            async function clearWebhooks() {
                if (!confirm("Clear all recorded webhooks?")) return;
                await fetch('/api/clear', { method: 'POST' });
                selectedId = null;
                webhooks = [];
                renderList();
                document.getElementById('main-content').innerHTML = `
                    <div class="empty-state">
                        <h2>No Webhook Selected</h2>
                        <p>Select a transaction from the left sidebar or wait for incoming requests.</p>
                    </div>`;
            }

            function renderList() {
                const list = document.getElementById('webhook-list');
                if (webhooks.length === 0) {
                    list.innerHTML = '<div style="padding: 20px; text-align: center; color: #64748b;">No webhooks received yet.<br><br>Send a POST request to this domain!</div>';
                    return;
                }

                list.innerHTML = webhooks.map(w => {
                    let summary = w.path;
                    try {
                        const parsed = JSON.parse(w.body);
                        if (parsed.file_name) summary = parsed.file_name;
                        else if (parsed.msg) summary = parsed.msg;
                        else if (parsed.action) summary = parsed.action;
                    } catch(e) {}

                    return `
                    <div class="item ${w.id === selectedId ? 'active' : ''}" onclick="selectItem(${w.id})">
                        <div class="item-meta">
                            <span>#${w.id} • ${w.method}</span>
                            <span>${w.timestamp}</span>
                        </div>
                        <div class="item-title">${summary}</div>
                    </div>`;
                }).join('');
            }

            function selectItem(id) {
                selectedId = id;
                renderList();
                const item = webhooks.find(w => w.id === id);
                if (item) renderDetail(item);
            }

            function renderDetail(w) {
                const main = document.getElementById('main-content');
                
                let formattedBody = w.body;
                try {
                    const parsed = JSON.parse(w.body);
                    formattedBody = JSON.stringify(parsed, null, 2);
                } catch(e) {}

                let headersObj = {};
                try { headersObj = JSON.parse(w.headers); } catch(e) {}
                const formattedHeaders = JSON.stringify(headersObj, null, 2);

                main.innerHTML = `
                    <div class="detail-header">
                        <div>
                            <span class="badge">${w.method}</span>
                            <span class="detail-title">${w.path}</span>
                        </div>
                        <span style="color: #94a3b8; font-size: 14px;">Received at ${w.timestamp}</span>
                    </div>
                    <div class="section-title">Payload / Body</div>
                    <pre><code>${escapeHtml(formattedBody)}</code></pre>
                    <div class="section-title">Headers</div>
                    <pre><code>${escapeHtml(formattedHeaders)}</code></pre>
                `;
            }

            function escapeHtml(str) {
                return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
            }

            // Init
            const savedInterval = localStorage.getItem('refresh_interval') || '5000';
            const selectEl = document.getElementById('refresh-interval');
            if (selectEl) selectEl.value = savedInterval;
            updateAutoRefresh();
            fetchWebhooks();
        </script>
    </body>
    </html>"""

    class RequestHandler(BaseHTTPRequestHandler):
        def log_message(self, format, *args):
            pass

        def do_POST(self):
            if self.path == "/api/clear":
                conn = get_db()
                conn.execute("DELETE FROM webhooks")
                conn.commit()
                conn.close()
                self.send_json({"status": "cleared"})
                return

            content_length = int(self.headers.get('Content-Length', 0))
            post_data = self.rfile.read(content_length).decode('utf-8', errors='replace')
            headers_dict = dict(self.headers)
            
            conn = get_db()
            cursor = conn.cursor()
            cursor.execute(
                "INSERT INTO webhooks (method, path, headers, body) VALUES (?, ?, ?, ?)",
                (self.command, self.path, json.dumps(headers_dict), post_data)
            )
            webhook_id = cursor.lastrowid
            conn.commit()
            conn.close()

            print(f"\n[#{webhook_id}] {self.command} {self.path}", flush=True)
            try:
                print(json.dumps(json.loads(post_data), indent=2), flush=True)
            except:
                print(post_data, flush=True)

            self.send_json({"status": "recorded", "id": webhook_id})

        def do_GET(self):
            if self.path.startswith("/api/webhooks"):
                conn = get_db()
                cursor = conn.cursor()
                cursor.execute("SELECT * FROM webhooks ORDER BY id DESC LIMIT 100")
                rows = [dict(row) for row in cursor.fetchall()]
                conn.close()
                self.send_json(rows)
            else:
                self.send_response(200)
                self.send_header('Content-Type', 'text/html; charset=utf-8')
                self.end_headers()
                self.wfile.write(HTML_PAGE.encode('utf-8'))

        def send_json(self, data, status=200):
            self.send_response(status)
            self.send_header('Content-Type', 'application/json')
            self.end_headers()
            self.wfile.write(json.dumps(data).encode('utf-8'))

    def run(port=8080):
        server_address = ('', port)
        httpd = HTTPServer(server_address, RequestHandler)
        print(f"Starting Webhook Inspector on port {port}...", flush=True)
        httpd.serve_forever()

    if __name__ == '__main__':
        run()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-echo
  namespace: wiz-remediation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-echo
  template:
    metadata:
      labels:
        app: webhook-echo
    spec:
      containers:
      - name: python
        image: python:3-alpine
        command: ["python", "-u", "/app/server.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: script-volume
          mountPath: /app
      volumes:
      - name: script-volume
        configMap:
          name: webhook-echo-script
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-echo
  namespace: wiz-remediation
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: webhook-echo
